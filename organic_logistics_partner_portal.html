                        <img className="w-full h-full object-cover filter brightness-95 contrast-75" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABePW6jJ6qf_ay_sGXzcd2815K1BWpMEDn562Y4boSBFjs1L6Zw3lF52tyF8SqR04THyN5VhlZPGF5wvw10CARvCNaYzZfOO1hSJHmwnsuvf-leSSErcTBZQmClNEzHs6Rw-YXPcWY1MQrxpmE0ynJTY0Sbx2r3D6B2fGT1xY7-f7jbBUqLppYH1CXwiRZVfLL2DJilSfNbY6TG6QT-0h3P9l_4xC9sSKJvrM0EDaDGmP6T7tsVTLaT6FPDsnVuuolF8ZZO4ZBb7s"/>
                        <div className="map-gradient-overlay absolute inset-0"></div>
                        <div className="absolute top-[20%] transition-all duration-100" style={{left: `${pos}%`}}>
                            <div className="w-4 h-4 bg-primary rounded-full user-location-pulse z-10 border-2 border-white shadow-lg"></div>
                        </div>
                        <div className="absolute top-[60%] left-[75%]">
                            <div className="bg-secondary-container text-on-secondary-container px-sm py-xs rounded-lg font-bold shadow-md flex items-center space-x-xs">
                                <span className="material-symbols-outlined text-sm">location_on</span>
                                <span>Drop-off</span>
                            </div>
                        </div>
                    </div>

                    <div className="absolute top-24 left-md z-20 w-80">
                        <div className="glass-panel p-md rounded-xl shadow-lg border border-white/40">
                            <div className="flex items-center space-x-md mb-sm">
                                <div className="bg-primary p-3 rounded-xl text-white">
                                    <span className="material-symbols-outlined text-[32px]">turn_right</span>
                                </div>
                                <div>
                                    <p className="font-headline-sm text-primary">Turn Right</p>
                                    <p className="text-on-surface-variant font-body-md">onto Market St.</p>
                                </div>
                            </div>
                            <div className="flex justify-between items-end">
                                <div>
                                    <p className="text-on-surface-variant text-label-sm uppercase">Next turn in</p>
                                    <p className="font-headline-md text-primary">450 <span className="text-body-md">m</span></p>
                                </div>
                                <div className="text-right">
                                    <p className="text-on-surface-variant text-label-sm uppercase">ETA</p>
                                    <p className="font-headline-md text-secondary">11:42 <span className="text-body-md">AM</span></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="absolute top-24 right-md z-30 flex flex-col items-end space-y-md">
                        <div className="glass-panel p-sm rounded-full shadow-lg border border-white/40 flex flex-col space-y-sm">
                            <button className="w-12 h-12 rounded-full bg-surface-container-lowest text-primary flex items-center justify-center hover:bg-primary hover:text-white transition-all shadow-sm">
                                <span className="material-symbols-outlined">my_location</span>
                            </button>
                            <button className="w-12 h-12 rounded-full bg-surface-container-lowest text-primary flex items-center justify-center hover:bg-primary hover:text-white transition-all shadow-sm">
                                <span className="material-symbols-outlined">layers</span>
                            </button>
                        </div>
                    </div>

                    <div className={`absolute bottom-0 left-0 w-full z-40 px-md transition-transform duration-300 ${isExpanded ? 'translate-y-0' : 'translate-y-[calc(100%-80px)] md:translate-y-[calc(100%-120px)]'}`}>
                        <div className="glass-panel rounded-t-3xl shadow-2xl border-t border-white/60 p-md md:p-xl max-w-4xl mx-auto">
                            <div className="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-lg cursor-pointer" onClick={() => setIsExpanded(!isExpanded)}></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-md md:gap-xl">
                                <div className="space-y-lg">
                                    <div className="flex items-start space-x-md">
                                        <img alt="Customer" className="w-16 h-16 rounded-2xl object-cover shadow-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqSU7gd4cpBi41Rovyqz9IZ4dqnMPFxuh-oWIwJBR7s1HfDlbGP_kb0U45DJsEf60Nt14yjVk4t-zyB9z0HgCU_XIQQgUDV8oxvpjqg2eHeDZBLBS-kzV8b7ejT6JtRu9pa4JMtC3aAJam4t7AxcjjrekCVEeGzGE262kFGhqWvbi9zyDU7meHEwkLZuwfL5k5YyVgkv5l5fxvCWm2GxYov4p9dXVjlrkFJ73ay8AXZQA2etyTp85lnlsHPDuy2DS5VhEl4JNsDOk"/>
                                        <div>
                                            <p className="text-label-sm text-on-surface-variant uppercase tracking-widest mb-xs">Customer</p>
                                            <h3 className="font-headline-md text-on-surface">Julian Sterling</h3>
                                            <p className="text-body-md text-primary font-semibold flex items-center">
                                                <span className="material-symbols-outlined scale-75 mr-xs" style={{fontVariationSettings: "'FILL' 1"}}>star</span>
                                                4.9 Premium Member
                                            </p>
                                        </div>
                                    </div>
                                    <div className="space-y-md">
                                        <div className="flex items-start space-x-md">
                                            <div className="w-8 flex flex-col items-center">
                                                <span className="material-symbols-outlined text-tertiary-container" style={{fontVariationSettings: "'FILL' 1"}}>eco</span>
                                                <div className="w-0.5 h-12 border-l-2 border-dashed border-outline-variant my-xs"></div>
                                            </div>
                                            <div>
                                                <p className="text-label-sm text-on-surface-variant uppercase">Pickup From</p>
                                                <p className="font-body-lg font-bold text-on-surface">Green Valley Organics</p>
                                                <p className="text-body-md text-on-surface-variant">1200 Market Street, Suite 400</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start space-x-md">
                                            <div className="w-8 flex justify-center">
                                                <span className="material-symbols-outlined text-primary" style={{fontVariationSettings: "'FILL' 1"}}>home_pin</span>
                                            </div>
                                            <div>
                                                <p className="text-label-sm text-on-surface-variant uppercase">Drop-off At</p>
                                                <p className="font-body-lg font-bold text-on-surface">88 Pine Terrace</p>
                                                <p className="text-body-md text-on-surface-variant">Apt 4B, Access Code: 2931</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col justify-between">
                                    <div className="flex justify-between items-center px-md mb-lg">
                                        <Step icon="check" label="Pickup" active />
                                        <div className="h-0.5 flex-1 bg-primary mb-5"></div>
                                        <Step icon="local_shipping" label="On the Way" active />
                                        <div className="h-0.5 flex-1 bg-surface-container-highest mb-5"></div>
                                        <Step icon="inventory_2" label="Delivered" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-md">
                                        <button className="flex items-center justify-center space-x-sm border-2 border-primary text-primary py-md rounded-xl font-label-lg hover:bg-primary/5 transition-all active:scale-95">
                                            <span className="material-symbols-outlined">chat</span>
                                            <span>Contact</span>
                                        </button>
                                        <button 
                                            onClick={() => setShowSuccess(true)}
                                            className="flex items-center justify-center space-x-sm bg-secondary-container text-on-secondary-container py-md rounded-xl font-label-lg shadow-lg hover:brightness-105 transition-all active:scale-95 group"
                                        >
                                            <span className="material-symbols-outlined group-hover:translate-x-1 transition-transform">check_circle</span>
                                            <span>Complete</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {showSuccess && (
                        <div className="fixed inset-0 z-[60] bg-primary/95 flex items-center justify-center transition-opacity duration-500">
                            <div className="text-center text-white p-xl max-w-md animate-in fade-in zoom-in duration-300">
                                <div className="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-xl animate-bounce">
                                    <span className="material-symbols-outlined text-[64px]" style={{fontVariationSettings: "'wght' 700"}}>done_all</span>
                                </div>
                                <h2 className="font-display-lg text-display-lg mb-md">Excellent Work!</h2>
                                <p className="text-body-lg mb-xl opacity-90">Delivery completed successfully. You earned $14.50 plus a $5.00 tip for this trip.</p>
                                <button 
                                    className="bg-secondary-container text-on-secondary-container px-xl py-lg rounded-full font-label-lg shadow-2xl hover:scale-105 transition-transform"
                                    onClick={() => setShowSuccess(false)}
                                >
                                    Return to Map
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Step = ({ icon, label, active }) => (
            <div className="flex flex-col items-center">
                <div className={`w-10 h-10 rounded-full flex items-center justify-center mb-xs shadow-md ${active ? 'bg-primary text-white' : 'bg-surface-container-highest text-on-surface-variant'}`}>
                    <span className="material-symbols-outlined scale-75" style={active ? {fontVariationSettings: "'wght' 700"} : {}}>{icon}</span>
                </div>
                <span className={`text-label-sm font-bold ${active ? 'text-primary' : 'text-on-surface-variant'}`}>{label}</span>
            </div>
        );

        // --- App Shell ---

        const App = () => {
            const location = useLocation();
            const [isOnline, setIsOnline] = useState(true);

            return (
                <div className="flex min-h-screen">
                    <Sidebar activePath={location.pathname} />
                    <Routes>
                        <Route path="/" element={<Dashboard isOnline={isOnline} setIsOnline={setIsOnline} />} />
                        <Route path="/active-deliveries" element={<ActiveDeliveries isOnline={isOnline} setIsOnline={setIsOnline} />} />
                    </Routes>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
