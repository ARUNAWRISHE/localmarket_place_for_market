                                            className={`flex flex-col items-center gap-2 relative z-10 stagger-in ${!step.active ? 'opacity-40' : ''}`}
                                            style={{animationDelay: `${idx * 0.1}s`}}
                                            onClick={() => idx === 5 && navigate('/delivered')}
                                        >
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center ${step.current ? 'bg-primary-container border-4 border-primary-fixed relative' : step.active ? 'bg-primary text-white' : 'bg-outline-variant'}`}>
                                                {step.current && <div className="absolute inset-0 w-full h-full bg-primary rounded-full animate-ping opacity-20"></div>}
                                                {step.current ? <div className="w-3 h-3 bg-primary rounded-full"></div> : <span className="material-symbols-outlined">{step.icon}</span>}
                                            </div>
                                            <span className={`text-label-lg font-bold ${step.current ? 'text-primary' : ''}`}>{step.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-4 flex flex-col gap-gutter">
                            <DeliveryPartnerCard />
                            <OrderSummary />
                            <div className="bg-primary-container/10 p-6 rounded-3xl border border-primary/10">
                                <h3 className="font-label-lg font-bold text-primary mb-3 flex items-center gap-2">
                                    <span className="material-symbols-outlined text-[20px]">info</span> Delivery Instructions
                                </h3>
                                <ul className="space-y-3">
                                    <li className="flex items-start gap-3">
                                        <span className="material-symbols-outlined text-primary text-[20px]">gate</span>
                                        <span className="text-body-md text-on-surface-variant">Leave at the front gate</span>
                                    </li>
                                    <li className="flex items-start gap-3">
                                        <span className="material-symbols-outlined text-primary text-[20px]">contactless</span>
                                        <span className="text-body-md text-on-surface-variant">Contactless delivery enabled</span>
                                    </li>
                                </ul>
                            </div>
                            <button 
                                onClick={() => navigate('/delivered')}
                                className="bg-secondary-container text-on-secondary-container p-6 rounded-3xl relative overflow-hidden text-left hover:scale-[1.02] transition-transform active:scale-95"
                            >
                                <div className="relative z-10">
                                    <h4 className="font-headline-sm">Invite & Earn</h4>
                                    <p className="text-label-lg opacity-80 mb-4">Get $10 for each friend you refer.</p>
                                    <span className="bg-on-secondary-container text-white px-6 py-2 rounded-full text-label-lg font-bold">Refer Now</span>
                                </div>
                                <span className="material-symbols-outlined absolute -bottom-4 -right-4 text-[120px] opacity-10 rotate-12">redeem</span>
                            </button>
                        </div>
                    </div>
                </main>
            );
        };

        const SuccessPage = () => {
            const navigate = useNavigate();
            return (
                <div className="fixed inset-0 z-[100] bg-surface-container-highest/80 backdrop-blur-md flex items-center justify-center p-margin-mobile">
                    <div className="bg-surface-container-lowest w-full max-w-lg rounded-[40px] p-10 shadow-xl text-center relative overflow-hidden">
                        <div className="absolute inset-0 pointer-events-none opacity-20">
                            <div className="absolute top-10 left-10 w-4 h-4 rounded-full bg-primary animate-bounce"></div>
                            <div className="absolute top-20 right-20 w-3 h-3 rounded-full bg-secondary animate-pulse"></div>
                            <div className="absolute bottom-10 left-1/4 w-4 h-4 bg-tertiary-fixed rotate-45 animate-bounce"></div>
                        </div>
                        <div className="w-24 h-24 bg-primary text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                            <span className="material-symbols-outlined text-[48px]">check_circle</span>
                        </div>
                        <h2 className="font-display-lg text-display-lg text-primary mb-2">Delivered!</h2>
                        <p className="text-body-lg text-on-surface-variant mb-8">Your organic goodies have arrived at your doorstep. Enjoy the freshness!</p>
                        <div className="space-y-6">
                            <div className="bg-surface-container p-6 rounded-2xl">
                                <p className="font-label-lg mb-3">Rate your delivery experience</p>
                                <div className="flex justify-center gap-2">
                                    {[1, 2, 3, 4, 5].map((star) => (
                                        <span key={star} className="material-symbols-outlined text-outline-variant cursor-pointer hover:text-secondary transition-colors text-[32px]">star</span>
                                    ))}
                                </div>
                            </div>
                            <div className="flex flex-col gap-3">
                                <button className="w-full py-4 bg-primary text-on-primary rounded-2xl font-bold text-lg hover:shadow-lg transition-all" onClick={() => navigate('/')}>
                                    Back to Tracking
                                </button>
                                <button className="w-full py-4 border-2 border-primary text-primary rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-primary/5 transition-all">
                                    <span className="material-symbols-outlined">download</span> Download Invoice
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Layout = ({ children }) => (
            <div className="bg-background font-body-md text-on-surface min-h-screen">
                <NavBar />
                {children}
                <Footer />
                {/* Mobile Bottom Nav */}
                <nav className="fixed bottom-0 w-full lg:hidden z-50 bg-surface/90 dark:bg-surface-container/90 backdrop-blur-lg border-t border-outline-variant/30 shadow-[0px_-4px_20px_rgba(45,90,39,0.05)]">
                    <div className="flex justify-around items-center px-4 py-2 pb-safe">
                        <div className="flex flex-col items-center justify-center text-on-surface-variant tap-highlight-transparent active:scale-90 transition-all">
                            <span className="material-symbols-outlined">home</span>
                            <span className="font-label-sm text-label-sm">Home</span>
                        </div>
                        <div className="flex flex-col items-center justify-center text-on-surface-variant tap-highlight-transparent active:scale-90 transition-all">
                            <span className="material-symbols-outlined">grid_view</span>
                            <span className="font-label-sm text-label-sm">Categories</span>
                        </div>
                        <div className="flex flex-col items-center justify-center text-primary bg-secondary-container rounded-full px-4 py-1 tap-highlight-transparent active:scale-90 transition-all">
                            <span className="material-symbols-outlined">local_shipping</span>
                            <span className="font-label-sm text-label-sm">Track</span>
                        </div>
                        <div className="flex flex-col items-center justify-center text-on-surface-variant tap-highlight-transparent active:scale-90 transition-all">
                            <span className="material-symbols-outlined">person</span>
                            <span className="font-label-sm text-label-sm">Profile</span>
                        </div>
                    </div>
                </nav>
            </div>
        );

        const App = () => {
            return (
                <MemoryRouter>
                    <Layout>
                        <Routes>
                            <Route path="/" element={<TrackingPage />} />
                            <Route path="/delivered" element={<SuccessPage />} />
                        </Routes>
                    </Layout>
                </MemoryRouter>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
