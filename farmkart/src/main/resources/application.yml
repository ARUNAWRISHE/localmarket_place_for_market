server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: farmkart
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/farmkart}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  jackson:
    time-zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cache:
    type: ${CACHE_TYPE:none}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:WARN}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG:WARN}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod}
      issuer: ${JWT_ISSUER:farmkart}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Requested-With
    exposed-headers: Authorization

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
